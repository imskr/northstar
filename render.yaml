services:
  - type: web
    name: northstar-portfolio
    runtime: python
    buildCommand: pip install -r requirements-turso.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 90 'northstar:create_app()'
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: true
      - key: ALLOW_REGISTRATION
        value: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
