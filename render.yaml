services:
  - type: web
    name: northstar-portfolio
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements-turso.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --worker-class sync --timeout 90 --access-logfile - --error-logfile - 'northstar:create_app()'
    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3

      - key: SESSION_SECRET
        generateValue: true

      - key: COOKIE_SECURE
        value: true

      - key: ALLOW_REGISTRATION
        value: true

      - key: TURSO_DATABASE_URL
        sync: false

      - key: TURSO_AUTH_TOKEN
        sync: false
